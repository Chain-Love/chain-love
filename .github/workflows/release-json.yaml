name: Release JSONs

on:
  # We cannot trigger this workflow by pushes to the json branch
  # because pushes made by other workflows with the default token
  # do not emit a suitable event.
  workflow_run:
    workflows:
      - "CSV to JSON"
      - "ERC-8004 agents refresh"
      - "Verified metrics refresh"
    types:
      - completed
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: json

      - name: Get latest JSON release commit
        id: last
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last_tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName')

          if [ -z "$last_tag" ]; then
            echo "last_commit=" >> $GITHUB_OUTPUT
            exit 0
          fi

          commit=$(git rev-list -n 1 "$last_tag")
          echo "last_commit=$commit" >> $GITHUB_OUTPUT
      
      - name: Check if json branch changed
        id: check
        run: |
          head=$(git rev-parse HEAD)
          last="${{ steps.last.outputs.last_commit }}"

          if [ "$head" = "$last" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release assets
        if: steps.check.outputs.changed == 'true'
        id: prep
        run: |
          mkdir -p release-assets
          cp json/*.json release-assets/

      - name: Create GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="json-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          gh release create "$tag" release-assets/* \
            --title "JSON (${GITHUB_SHA::7})" \
            --notes "Automated release from json branch"
