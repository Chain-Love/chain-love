name: "ERC-8004 agents refresh"

on:
  schedule:
    # Same cadence as verified-refresh (every 30 min)
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agents-refresh
  cancel-in-progress: false

env:
  TARGET_BRANCH: json

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout json branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout json-tools branch into tools folder
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: json-tools
          path: json-tools
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy script to workspace
        run: |
          cp -r json-tools/tools/validation .
          cp json-tools/tools/schema.json .
          cp json-tools/tools/validate.py .
          cp json-tools/tools/fetch_agents.py .

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r json-tools/tools/requirements.txt

      - name: Fetch ERC-8004 agents
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
          ERC8004_SUBGRAPH_IDS: ${{ vars.ERC8004_SUBGRAPH_IDS }}
        run: python3 fetch_agents.py

      - name: Commit and push
        run: |
          git add json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh ERC-8004 agents"
            git push origin ${{ env.TARGET_BRANCH }}
          fi
